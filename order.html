<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Track your AMOO STORE orders and delivery status." />
  <title>AMOO STORE | My Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="order">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <header class="site-header">
    <a class="brand" href="index.html" aria-label="AMOO STORE home">
      <span class="brand-mark">👔</span>
      <span class="brand-text">
        <strong>AMOO STORE</strong>
        <small>Premium Fashion</small>
      </span>
    </a>

    <button class="menu-button" type="button" aria-expanded="false" aria-controls="nav-links">
      <span></span>
      <span></span>
      <span></span>
      <span class="sr-only">Open menu</span>
    </button>

    <nav class="nav" id="nav-links">
      <a href="index.html#collections">Collections</a>
      <a href="visit store.html">Store</a>
      <a href="cart.html">Cart</a>
      <a href="order.html" class="nav-cta">My Orders</a>
    </nav>

    <button class="account-button" type="button" aria-label="Open account">
      <span class="account-button-icon">👤</span>
      <span class="account-button-label">Account</span>
    </button>
  </header>

  <main class="page-shell" id="order-page">
    <section class="section reveal">
      <div class="section-heading">
        <p class="eyebrow">Orders</p>
        <h1>My Orders</h1>
        <p>View all your orders, status, and delivery details here.</p>
      </div>

      <div class="orders-container" data-orders-list></div>
      <div class="orders-empty" data-orders-empty hidden>
        <p>You have no orders yet. <a href="visit store.html">Start shopping</a></p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> AMOO STORE. Track your order status in real-time.</p>
  </footer>

  <script src="script.js"></script>
  <script src="order.js"></script>
</body>
</html>
